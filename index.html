<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>frame foto 1x3?</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Engine using Native Canvas 2D -->
    <link rel="stylesheet" href="style.css?v=4">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1>When<span>Yh</span></h1>
            <!-- <p>Professional Photo-to-Video Editor</p> -->
        </header>

        <main class="main-content">
            <!-- Left Panel: Preview & Controls -->
            <section class="player-section">
                <div class="canvas-container">
                    <div class="device-mockup">
                        <div class="mockup-notch"></div>
                        <canvas id="videoCanvas" width="1080" height="1920"></canvas>
                        <div class="canvas-overlay" id="canvasOverlay">
                            <span class="status-text">Loading Template...</span>
                        </div>
                    </div>
                </div>

                <div class="controls-panel">
                    <div class="timeline-container">
                        <span id="currentTime">00:00</span>
                        <input type="range" id="progressBar" min="0" max="100" value="0" step="0.1">
                        <span id="totalTime">00:00</span>
                    </div>

                    <div class="action-buttons">
                        <button id="btnPlayPause" class="btn primary">Play</button>
                        <button id="btnExport" class="btn success" disabled>Export Video</button>
                    </div>

                    <div class="audio-upload">
                        <label for="audioInput">🎵 Add Background Music</label>
                        <input type="file" id="audioInput" accept="audio/*">
                    </div>
                    <!-- Status or progress info -->
                    <div id="renderStatus" class="render-status hidden">
                        Rendering: <span id="renderProgress">0%</span>
                    </div>
                </div>
            </section>

            <!-- Right Panel: Media Slots -->
            <section class="media-section">
                <div class="panel-header">
                    <h2>Template Media</h2>
                    <p>Upload your photos to replace the placeholders.</p>
                </div>

                <div class="template-selector">
                    <label for="templateSelect">Choose Template:</label>
                    <select id="templateSelect" class="form-select">
                        <option value="template.xml">Template 1 (Default)</option>
                        <option value="template2.xml">Template 2 (Kennprst 9:16)</option>
                        <option value="template3.xml">Template 3 (adelaakyoken!)</option>
                    </select>
                </div>
                
                <div class="slots-container" id="slotsContainer">
                    <!-- Dynamic slots will be injected here via app.js -->
                    <div class="loading-slots">Analyzing XML...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js?v=4"></script>
</body>

</html>
